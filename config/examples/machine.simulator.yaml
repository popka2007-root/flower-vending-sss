persistence:
  sqlite_path: var/data/flower_vending_simulator.db
  busy_timeout_ms: 5000
  enable_wal: true
  synchronous: FULL

logging:
  level: DEBUG
  directory: var/log
  filename: flower_vending.simulator.jsonl
  json: true
  stderr: true
  rotation:
    max_bytes: 5242880
    backup_count: 3

platform:
  target_os: generic
  kiosk_mode: false
  autostart_mode: none
  watchdog:
    enabled: false
    adapter: simulator
    policy:
      timeout_s: 1.0
      retry_count: 1
      retryable_faults: [command_timeout, transient_command_failure, communication_error]
      non_retryable_faults:
        - ambiguous_physical_result
        - physical_state_mismatch
        - reconciliation_required
        - unsupported_operation
        - configuration_error
      require_manual_review_on_ambiguous_result: true
    settings: {}

simulator:
  enabled: true
  startup_scenario:
  scenario_suite:
    - normal_sale
    - insufficient_change
    - bill_rejected
    - partial_payout
    - product_vend_failure
    - door_open
    - critical_temperature
    - inventory_mismatch
    - pickup_timeout
  accepted_bill_denominations_minor: [50000, 100000, 200000, 500000]
  quick_insert_bill_denominations_minor: [50000, 100000, 200000, 500000]
  change_inventory:
    100000: 10
    50000: 10
    10000: 20
    5000: 20
    1000: 50
  initial_temperature_celsius: 4.0
  initial_service_door_open: false
  initial_inventory_presence: true
  initial_inventory_confidence: 1.0
  initial_faults: []

devices:
  bill_validator:
    enabled: true
    driver: dbv300sd
    device_name: simulator_bill_validator_contract
    transport_kind: serial
    protocol_kind: serial
    poll_interval_s: 0.2
    startup_disable_acceptance: true
    fallback_disable_on_fault: true
    requires_hardware_confirmation: false
    accepted_denominations_minor: [50000, 100000, 200000, 500000]
    policy: &simulator_device_policy
      timeout_s: 1.0
      retry_count: 1
      retryable_faults: [command_timeout, transient_command_failure, communication_error]
      non_retryable_faults:
        - ambiguous_physical_result
        - physical_state_mismatch
        - reconciliation_required
        - unsupported_operation
        - configuration_error
      require_manual_review_on_ambiguous_result: true
    serial:
      port: SIMULATOR
      baudrate: 9600
      bytesize: 8
      parity: N
      stopbits: 1
      read_timeout_s: 0.2
      write_timeout_s: 0.2

  change_dispenser:
    enabled: true
    driver: simulator
    device_name: mock_change_dispenser
    mapping: simulator_change_dispenser
    timeouts_ms:
      dispense: 100
    policy: *simulator_device_policy
    settings: {}
    requires_hardware_confirmation: false

  motor_controller:
    enabled: true
    driver: simulator
    device_name: mock_motor_controller
    mapping: simulator_motor
    timeouts_ms:
      vend: 100
      home: 100
    policy: *simulator_device_policy
    settings: {}
    requires_hardware_confirmation: false

  cooling_controller:
    enabled: true
    driver: simulator
    device_name: mock_cooling_controller
    mapping: simulator_cooling
    timeouts_ms:
      command: 100
    policy: *simulator_device_policy
    settings: {}
    requires_hardware_confirmation: false

  window_controller:
    enabled: true
    driver: simulator
    device_name: mock_window_controller
    mapping: simulator_window
    timeouts_ms:
      open: 100
      close: 100
    policy: *simulator_device_policy
    settings: {}
    requires_hardware_confirmation: false

  temperature_sensor:
    enabled: true
    driver: simulator
    device_name: mock_temperature_sensor
    mapping: simulator_temperature
    timeouts_ms:
      read: 100
    policy: *simulator_device_policy
    settings: {}
    requires_hardware_confirmation: false

  door_sensor:
    enabled: true
    driver: simulator
    device_name: mock_door_sensor
    mapping: simulator_door
    timeouts_ms:
      read: 100
    policy: *simulator_device_policy
    settings: {}
    requires_hardware_confirmation: false

  inventory_sensor:
    enabled: true
    driver: simulator
    device_name: mock_inventory_sensor
    mapping: simulator_inventory
    timeouts_ms:
      read: 100
    policy: *simulator_device_policy
    settings: {}
    requires_hardware_confirmation: false

  position_sensor:
    enabled: true
    driver: simulator
    device_name: mock_position_sensor
    mapping: simulator_position
    timeouts_ms:
      read: 100
    policy: *simulator_device_policy
    settings: {}
    requires_hardware_confirmation: false
